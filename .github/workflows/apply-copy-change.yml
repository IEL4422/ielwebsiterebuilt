name: Apply trust funding copy change

on:
  push:
    branches:
      - copy/trust-funding-guidance

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply copy change
        run: python3 scripts/apply_trust_funding_copy.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "no changes"
            exit 1
          fi
          git add -A
          git commit -m "Scope change: full trust funding -> trust funding guidance"
          git push
